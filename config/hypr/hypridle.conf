general {
    ignore_dbus_inhibit = false             # whether to ignore dbus-sent idle-inhibit requests (used by e.g. firefox or steam)
    ignore_systemd_inhibit = false          # whether to ignore systemd-inhibit --what=idle inhibitors

    lock_cmd = ~/.local/bin/hyprlock-wrapper.sh
    before_sleep_cmd = ~/.local/bin/battery-mark.sh pre && (pidof hyprlock || ~/.local/bin/hyprlock-wrapper.sh)
    after_sleep_cmd = ~/.local/bin/battery-mark.sh post && hyprctl dispatch dpms on

    inhibit_sleep = 3
}

# -- 30s heads-up before the lock
listener {
    timeout = 270
    on-timeout = dunstify -t 30000 "😴 Locking soon..." "💤 Going to sleep in 30s — move the mouse or press a key to stay awake" --icon=system-suspend
    on-resume = dunstctl close-all
}

# -- lock after 5min of inactivity
listener {
    timeout = 300                            # in seconds
    on-timeout = hyprlock
 }

# -- shutdown lights after 10min
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}


# Suspend after 20 minutes of inactivity
# (If somehow not locked yet, lock first, then suspend.)
listener {
  timeout = 600
  on-timeout = bash -lc 'pgrep -x hyprlock >/dev/null || ~/.local/bin/hyprlock-wrapper.sh; ~/.local/bin/smart-suspend.sh'
}
