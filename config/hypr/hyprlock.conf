# ~/.config/hypr/hyprlock.conf
general {
    immediate_render = true
}

auth {
  fingerprint:enabled = true

  # Seems to be unused for now
  fingerprint:ready_message = "scan fingerprint"
  fingerprint:present_message = "nice finger"
}

animations {
  animation = fadeOut,1, 5, linear

  animation = inputFieldColors, 1, 10, linear
  animation = inputFieldDots, 1, 2, linear
  animation = inputFieldFade, 1, 10, linear
}

# Pulsing "Authenticating…" only while PAM is running
# (flag file created/removed by pam_exec as shown earlier)
label {
  monitor =
  text = cmd[update:100] ~/.local/bin/hyprlock-dots-loader.sh
#  font_family = Fira Code Retina
  font_size = 40
  color = rgba(255,255,255,0.9)   # unused; Pango sets color
  position = 210, -80
  halign = center
  valign = center
}

# Background
background {
    monitor =
    # Replace this path with the path to your desired lock screen wallpaper
    path = /home/xar/Images/Wallpapers/lockscreen.jpg
    blur_passes = 0
    blur_size = 5
}

# Input
input-field {
    monitor =
    size = 350, 55
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    
    inner_color = rgb(282a36)
    font_color = rgb(f8f8f2)
    fade_on_empty = false
    placeholder_text = <i>Password or fingerprint...</i>
    fail_text = <i>($ATTEMPTS) fail</i>
    hide_input = false
    rounding = 10

    check_color = rgba(bd93f9ee) rgba(ff79c6ee) 45deg
}

# Username
label {
    monitor =
    text = <span foreground="##f8f8f2">$USER</span><span foreground="##bd93f9">@cool-crocodile</span>

    font_family = Fira Code Retina
    font_size = 26
    color = rgba(255, 255, 255, 0.95)

    position = 0, 0
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = $TIME
    # You can customize the time format here, e.g., "%I:%M %p" for 12-h""our clock
    #time_format = %H:%M

    font_family = Space Grotesk Medium
    font_size = 96

    color = rgba(255,255,255,255,0.9)

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(ff79c655)

    # Top-left alignment
    position = 0, 120
    halign = center
    valign = center
}

# battery
label {
    monitor =
    text = cmd[update:5000] ~/.local/bin/battery-status.sh

    # style
    font_family = Space Grotesk Medium
    font_size = 20
    color = rgba(255,255,255,0.9)

    position = 16, 60
    halign = left
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:5000] uptime -p
    font_family = Space Grotesk Medium
    font_size = 20
    color = rgba(255,255,255,0.85)

    position = -32, 20
    halign = right
    valign = bottom
}

# --- Suspend usage badge (auto-updating; prints nothing if no data yet)
label {
  monitor =
  text = cmd[update:1000] ~/.local/bin/battery-usage-in-suspend.sh
  font_family = Space Grotesk Medium
  font_size = 20
  color = rgba(255,255,255,0.85)
  position = 16, 20
  halign = left
  valign = bottom
}

# Center card

# Center card border
shape {
    monitor =

    size = 764, 384

    # Neon purple border vibe
    color = rgba(bd93f922)

    rounding = 28

    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(bd93f933)

    position = 0, 40
    halign = center
    valign = center
}

# Center card
shape {
    monitor =

    # Slightly taller: fits username + input comfortably
    size = 760, 380

    # Deep bluish glass tint (cleaner than gray)
    color = rgba(20, 18, 32, 0.55)

    rounding = 28

    # Soft shadow = depth
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.55)

    position = 0, 40
    halign = center
    valign = center
}
